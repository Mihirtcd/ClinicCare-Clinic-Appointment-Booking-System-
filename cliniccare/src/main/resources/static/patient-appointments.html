<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicCare - My Appointments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" rel="stylesheet">
  <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="patient-dashboard.html">ClinicCare</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="index.html"><i class="bi bi-house-door me-1"></i>Home</a>
      <a class="nav-link" href="patient-dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
      <a class="nav-link" href="patient-booking.html"><i class="bi bi-calendar-plus me-1"></i>Book</a>
      <a class="nav-link active" href="patient-appointments.html"><i class="bi bi-calendar-check me-1"></i>My Appointments</a>
      <button class="btn btn-sm btn-light ms-2" id="logoutBtn"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
    </div>
  </div>
</nav>

<main class="container py-4">
  <h3 class="page-title mb-4">My Appointments</h3>
  <div id="alertBox"></div>

  <div class="card">
    <div class="card-body">
      <table class="table table-striped" id="appointmentsTable" style="width:100%">
        <thead>
        <tr>
          <th>Sr. No.</th>
          <th>Doctor</th>
          <th>Service</th>
          <th>Slot</th>
          <th>Status</th>
          <th>Note</th>
          <th>Booked At</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal fade" id="cancelConfirmModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Cancel Appointment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="mb-0">Are you sure you want to cancel this appointment?</p>
        <input type="hidden" id="cancelAppointmentId">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Keep</button>
        <button type="button" class="btn btn-danger" id="confirmCancelBtn"><i class="bi bi-x-circle me-1"></i>Yes, Cancel</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/ui-common.js"></script>
<script>
  let table;
  let cancelConfirmModal;
  const doctorMap = {};
  const serviceMap = {};

  function loadLookups() {
    return $.when(
      ClinicCare.api({ url: "/patient/doctors" }),
      ClinicCare.api({ url: "/patient/services" })
    ).done(function (doctorsResp, servicesResp) {
      const doctors = doctorsResp[0] || [];
      const services = servicesResp[0] || [];

      Object.keys(doctorMap).forEach(function (key) {
        delete doctorMap[key];
      });
      Object.keys(serviceMap).forEach(function (key) {
        delete serviceMap[key];
      });

      doctors.forEach(function (doctor) {
        doctorMap[doctor.id] = doctor;
      });

      services.forEach(function (service) {
        serviceMap[service.id] = service;
      });
    });
  }

  function loadAppointments() {
    ClinicCare.api({ url: "/patient/appointments" }).done(function (appointments) {
      table.clear();
      (appointments || []).forEach(function (item, index) {
        const doctor = doctorMap[item.doctorId];
        const service = serviceMap[item.serviceId];
        const doctorText = doctor ? ClinicCareUi.doctorLabel(doctor) : "Doctor";
        const serviceText = service ? (service.name || "Service") : "Service";
        const slotText = (item.slotStartTime && item.slotEndTime)
          ? (ClinicCare.formatDateTime(item.slotStartTime) + " - " + ClinicCare.formatDateTime(item.slotEndTime))
          : "Scheduled";
        const cancelAllowed = canCancel(item);
        const actionHtml = cancelAllowed
          ? '<button class="btn btn-sm btn-outline-danger cancel-btn" data-id="' + item.id + '"><i class="bi bi-x-circle me-1"></i>Cancel</button>'
          : "";

        table.row.add([
          index + 1,
          doctorText,
          serviceText,
          slotText,
          ClinicCare.statusBadge(item.status),
          item.patientNote || "",
          ClinicCare.formatDateTime(item.bookedAt),
          actionHtml
        ]);
      });
      table.draw();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  function parseDateTime(value) {
    const parsed = new Date(value);
    if (Number.isNaN(parsed.getTime())) {
      return null;
    }
    return parsed;
  }

  function canCancel(appointment) {
    if (!appointment) {
      return false;
    }

    const status = appointment.status;
    if (status !== "PENDING" && status !== "CONFIRMED") {
      return false;
    }

    const slotStart = parseDateTime(appointment.slotStartTime);
    if (!slotStart) {
      return true;
    }

    return Date.now() < slotStart.getTime();
  }

  function cancelAppointment(appointmentId) {
    ClinicCare.api({
      method: "PATCH",
      url: "/patient/appointments/" + appointmentId + "/cancel"
    }).done(function () {
      ClinicCare.showAlert("#alertBox", "success", "Appointment cancelled.");
      loadAppointments();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  $(function () {
    if (!ClinicCare.requireAuth(["PATIENT"])) {
      return;
    }

    table = ClinicCareUi.initDataTable("#appointmentsTable", {
      order: [[6, "desc"]],
      columnDefs: [
        { targets: 4, orderable: false },
        { targets: 7, orderable: false }
      ]
    });
    cancelConfirmModal = new bootstrap.Modal(document.getElementById("cancelConfirmModal"));

    $("#logoutBtn").on("click", ClinicCare.logout);
    $("#appointmentsTable").on("click", ".cancel-btn", function () {
      const appointmentId = Number($(this).data("id"));
      $("#cancelAppointmentId").val(appointmentId);
      cancelConfirmModal.show();
    });

    $("#confirmCancelBtn").on("click", function () {
      const appointmentId = Number($("#cancelAppointmentId").val());
      cancelConfirmModal.hide();
      cancelAppointment(appointmentId);
    });

    loadLookups().done(function () {
      loadAppointments();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  });
</script>
</body>
</html>
