<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicCare - My Appointments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" rel="stylesheet">
  <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="patient-dashboard.html">ClinicCare</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="patient-dashboard.html">Dashboard</a>
      <a class="nav-link" href="patient-booking.html">Book</a>
      <a class="nav-link active" href="patient-appointments.html">My Appointments</a>
      <button class="btn btn-sm btn-light ms-2" id="logoutBtn">Logout</button>
    </div>
  </div>
</nav>

<main class="container py-4">
  <h3 class="page-title mb-4">My Appointments</h3>
  <div id="alertBox"></div>

  <div class="card">
    <div class="card-body">
      <table class="table table-striped" id="appointmentsTable" style="width:100%">
        <thead>
        <tr>
          <th>Sr. No.</th>
          <th>Doctor</th>
          <th>Service</th>
          <th>Slot</th>
          <th>Status</th>
          <th>Note</th>
          <th>Booked At</th>
        </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
  let table;
  const doctorMap = {};
  const serviceMap = {};

  function doctorLabel(doctor) {
    if (!doctor) {
      return "Doctor";
    }
    const first = doctor.firstName || "";
    const last = doctor.lastName || "";
    const fullName = ("Dr. " + first + " " + last).replace(/\s+/g, " ").trim();
    if (doctor.specialization) {
      return fullName + " (" + doctor.specialization + ")";
    }
    return fullName;
  }

  function loadLookups() {
    return $.when(
      ClinicCare.api({ url: "/patient/doctors" }),
      ClinicCare.api({ url: "/patient/services" })
    ).done(function (doctorsResp, servicesResp) {
      const doctors = doctorsResp[0] || [];
      const services = servicesResp[0] || [];

      Object.keys(doctorMap).forEach(function (key) {
        delete doctorMap[key];
      });
      Object.keys(serviceMap).forEach(function (key) {
        delete serviceMap[key];
      });

      doctors.forEach(function (doctor) {
        doctorMap[doctor.id] = doctor;
      });

      services.forEach(function (service) {
        serviceMap[service.id] = service;
      });
    });
  }

  function loadAppointments() {
    ClinicCare.api({ url: "/patient/appointments" }).done(function (appointments) {
      table.clear();
      (appointments || []).forEach(function (item, index) {
        const doctor = doctorMap[item.doctorId];
        const service = serviceMap[item.serviceId];
        const doctorText = doctor ? doctorLabel(doctor) : "Doctor";
        const serviceText = service ? (service.name || "Service") : "Service";
        const slotText = (item.slotStartTime && item.slotEndTime)
          ? (ClinicCare.formatDateTime(item.slotStartTime) + " - " + ClinicCare.formatDateTime(item.slotEndTime))
          : "Scheduled";

        table.row.add([
          index + 1,
          doctorText,
          serviceText,
          slotText,
          ClinicCare.statusBadge(item.status),
          item.patientNote || "",
          ClinicCare.formatDateTime(item.bookedAt)
        ]);
      });
      table.draw();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  $(function () {
    if (!ClinicCare.requireAuth(["PATIENT"])) {
      return;
    }

    table = $("#appointmentsTable").DataTable({
      order: [[6, "desc"]],
      columnDefs: [
        { targets: 4, orderable: false }
      ]
    });

    $("#logoutBtn").on("click", ClinicCare.logout);
    loadLookups().done(function () {
      loadAppointments();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  });
</script>
</body>
</html>
