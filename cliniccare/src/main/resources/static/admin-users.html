<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicCare - Admin Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" rel="stylesheet">
  <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar" id="adminSidebar"></aside>

  <main class="admin-content">
    <div class="admin-page-head">
      <h3 class="page-title mb-0">Admin User Management</h3>
    </div>
    <div id="alertBox"></div>

    <div class="card mb-3">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label">Filter by Role</label>
            <select id="roleFilter" class="form-select">
              <option value="">All</option>
              <option value="PATIENT">PATIENT</option>
              <option value="DOCTOR">DOCTOR</option>
              <option value="ADMIN">ADMIN</option>
            </select>
          </div>
          <div class="col-md-3">
            <button class="btn btn-outline-primary w-100" id="filterBtn"><i class="bi bi-funnel me-1"></i>Apply Filter</button>
          </div>
          <div class="col-md-5 text-md-end">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createUserModal"><i class="bi bi-person-plus me-1"></i>Create DOCTOR User</button>
          </div>
        </div>
        <div class="form-text mt-2">Backend policy: admin can create only users with role DOCTOR.</div>
      </div>
    </div>

    <div class="card table-fit">
      <div class="card-body">
        <table class="table table-striped" id="usersTable" style="width:100%">
          <thead>
          <tr>
            <th>Sr. No.</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Phone</th>
          </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal fade" id="createUserModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <form class="modal-content" id="createUserForm">
      <div class="modal-header">
        <h5 class="modal-title">Create DOCTOR User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label required">First Name</label>
          <input type="text" id="firstName" class="form-control" maxlength="50" required>
        </div>
        <div class="mb-3">
          <label class="form-label required">Last Name</label>
          <input type="text" id="lastName" class="form-control" maxlength="50" required>
        </div>
        <div class="mb-3">
          <label class="form-label required">Email</label>
          <input type="email" id="email" class="form-control" maxlength="120" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input type="text" id="phoneNumber" class="form-control" maxlength="20">
        </div>
        <div class="mb-3">
          <label class="form-label required">Password</label>
          <input type="password" id="password" class="form-control" minlength="8" maxlength="72" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Role</label>
          <input type="text" class="form-control" value="DOCTOR" disabled>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i>Create User</button>
      </div>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/ui-common.js"></script>
<script src="assets/js/admin-shell.js"></script>
<script>
  let table;
  let createModal;

  function loadUsers() {
    const role = $("#roleFilter").val();
    const url = role ? ("/admin/users?role=" + encodeURIComponent(role)) : "/admin/users";

    ClinicCare.api({ url: url }).done(function (users) {
      table.clear();
      (users || []).forEach(function (u, index) {
        table.row.add([
          index + 1,
          u.firstName || "",
          u.lastName || "",
          u.email || "",
          ClinicCare.statusBadge(u.role),
          u.phoneNumber || ""
        ]);
      });
      table.draw();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  function createUser() {
    ClinicCare.api({
      method: "POST",
      url: "/admin/users",
      data: {
        firstName: $("#firstName").val().trim(),
        lastName: $("#lastName").val().trim(),
        email: $("#email").val().trim(),
        password: $("#password").val(),
        phoneNumber: $("#phoneNumber").val().trim(),
        role: "DOCTOR"
      }
    }).done(function (response) {
      createModal.hide();
      $("#createUserForm")[0].reset();
      ClinicCare.showAlert("#alertBox", "success", "DOCTOR user created successfully.");
      loadUsers();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  $(function () {
    ClinicCareUi.renderAdminSidebar("users");

    if (!ClinicCare.requireAuth(["ADMIN"])) {
      return;
    }

    createModal = new bootstrap.Modal(document.getElementById("createUserModal"));
    table = ClinicCareUi.initDataTable("#usersTable", {
      order: [[1, "asc"]],
      columnDefs: [
        { targets: 4, orderable: false }
      ]
    });

    $("#logoutBtn").on("click", ClinicCare.logout);
    $("#filterBtn").on("click", loadUsers);
    $("#createUserForm").on("submit", function (event) {
      event.preventDefault();
      createUser();
    });

    loadUsers();
  });
</script>
</body>
</html>
