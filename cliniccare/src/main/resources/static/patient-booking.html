<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicCare - Book Appointment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" rel="stylesheet">
  <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="patient-dashboard.html">ClinicCare</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="patient-dashboard.html">Dashboard</a>
      <a class="nav-link active" href="patient-booking.html">Book</a>
      <a class="nav-link" href="patient-appointments.html">My Appointments</a>
      <button class="btn btn-sm btn-light ms-2" id="logoutBtn">Logout</button>
    </div>
  </div>
</nav>

<main class="container py-4">
  <h3 class="page-title mb-4">Book Appointment</h3>
  <div id="alertBox"></div>

  <div class="card mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label required">Service</label>
          <select id="serviceSelect" class="form-select"></select>
        </div>
        <div class="col-md-4">
          <label class="form-label required">Doctor</label>
          <select id="doctorSelect" class="form-select" disabled></select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Date</label>
          <input type="date" id="slotDateFilter" class="form-control">
        </div>
        <div class="col-md-2 d-flex align-items-end">
          <button class="btn btn-primary w-100" id="loadSlotsBtn">Load Available Slots</button>
        </div>
      </div>
      <div class="small-muted mt-2">All slot times are shown in your local timezone.</div>
    </div>
  </div>

  <div class="card">
    <div class="card-header bg-white">Available Slots</div>
    <div class="card-body">
      <table class="table table-striped" id="slotsTable" style="width:100%">
        <thead>
        <tr>
          <th>Doctor</th>
          <th>Start</th>
          <th>End</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal fade" id="bookModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <form class="modal-content" id="bookForm">
      <div class="modal-header">
        <h5 class="modal-title">Confirm Appointment Booking</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="selectedSlotId">
        <p class="small-muted mb-3">Selected slot: <span id="selectedSlotText"></span></p>
        <div class="mb-3">
          <label class="form-label">Patient Note</label>
          <textarea id="patientNote" class="form-control" maxlength="500" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-success">Book Appointment</button>
      </div>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
  let slotsTable;
  let bookModal;
  const allDoctors = [];
  const doctorDirectory = {};
  let nowTick = new Date();

  function toDateInputValue(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");
    return year + "-" + month + "-" + day;
  }

  function refreshNow() {
    nowTick = new Date();
  }

  function parseSlotDate(value) {
    const parsed = new Date(value);
    if (Number.isNaN(parsed.getTime())) {
      return null;
    }
    return parsed;
  }

  function isPastSlot(slotStart) {
    return slotStart.getTime() < nowTick.getTime();
  }

  function doctorLabel(doctor) {
    if (!doctor) {
      return "Doctor";
    }
    const first = doctor.firstName || "";
    const last = doctor.lastName || "";
    const fullName = ("Dr. " + first + " " + last).replace(/\s+/g, " ").trim();
    if (doctor.specialization) {
      return fullName + " (" + doctor.specialization + ")";
    }
    return fullName;
  }

  function loadServices() {
    ClinicCare.api({ url: "/patient/services" }).done(function (services) {
      const select = $("#serviceSelect");
      select.empty();
      select.append('<option value="">Select service</option>');
      (services || []).forEach(function (item) {
        select.append('<option value="' + item.id + '">' + (item.name || "Service") + "</option>");
      });
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  function populateDoctorsForService(serviceId) {
    const select = $("#doctorSelect");
    select.empty();

    if (!serviceId) {
      select.append('<option value="">Select service first</option>');
      select.prop("disabled", true);
      return;
    }

    const doctorsForService = allDoctors.filter(function (doctor) {
      return Array.isArray(doctor.serviceIds) && doctor.serviceIds.includes(serviceId);
    });

    if (doctorsForService.length === 0) {
      select.append('<option value="">No doctors available</option>');
      select.prop("disabled", true);
      return;
    }

    select.append('<option value="">Select doctor</option>');
    doctorsForService.forEach(function (doctor) {
      select.append('<option value="' + doctor.id + '">' + doctorLabel(doctor) + "</option>");
    });
    select.prop("disabled", false);
  }

  function loadDoctors() {
    ClinicCare.api({ url: "/patient/doctors" }).done(function (doctors) {
      allDoctors.length = 0;
      Object.keys(doctorDirectory).forEach(function (key) {
        delete doctorDirectory[key];
      });

      (doctors || []).forEach(function (doctor) {
        allDoctors.push(doctor);
        doctorDirectory[doctor.id] = doctor;
      });

      const currentServiceId = Number($("#serviceSelect").val());
      populateDoctorsForService(currentServiceId);
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  function loadSlots() {
    $("#alertBox").empty();
    refreshNow();

    const serviceId = Number($("#serviceSelect").val());
    const doctorId = Number($("#doctorSelect").val());
    const dateFilter = $("#slotDateFilter").val();
    const doctor = doctorDirectory[doctorId];
    const today = toDateInputValue(nowTick);

    if (!serviceId) {
      ClinicCare.showAlert("#alertBox", "warning", "Please select a service.");
      return;
    }
    if (!doctorId) {
      ClinicCare.showAlert("#alertBox", "warning", "Please select a doctor.");
      return;
    }

    if (Array.isArray(doctor.serviceIds) && doctor.serviceIds.length > 0 && !doctor.serviceIds.includes(serviceId)) {
      slotsTable.clear().draw();
      ClinicCare.showAlert("#alertBox", "warning", "Selected doctor does not provide the selected service.");
      return;
    }

    ClinicCare.api({ url: "/patient/slots?doctorId=" + doctorId }).done(function (slots) {
      const rows = (slots || []).filter(function (slot) {
        const slotStart = parseSlotDate(slot.startTime);
        if (!slotStart) {
          return false;
        }

        if (dateFilter && toDateInputValue(slotStart) !== dateFilter) {
          return false;
        }

        if (dateFilter === today && isPastSlot(slotStart)) {
          return false;
        }

        return true;
      });

      slotsTable.clear();
      rows.forEach(function (slot) {
        const slotStart = parseSlotDate(slot.startTime);
        const slotEnd = parseSlotDate(slot.endTime);
        const pastSlot = slotStart ? isPastSlot(slotStart) : true;
        const actionBtn =
          '<button class="btn btn-sm btn-success book-btn" ' +
          'data-slot-id="' + slot.id + '" ' +
          'data-start="' + (slot.startTime || "") + '" ' +
          'data-end="' + (slot.endTime || "") + '" ' +
          (pastSlot ? "disabled" : "") + ">" +
          (pastSlot ? "Past" : "Book") + "</button>";
        slotsTable.row.add([
          doctorLabel(doctor),
          ClinicCare.formatDateTime(slotStart || slot.startTime),
          ClinicCare.formatDateTime(slotEnd || slot.endTime),
          ClinicCare.statusBadge(slot.status),
          actionBtn
        ]);
      });
      slotsTable.draw();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  function submitBooking() {
    refreshNow();
    const doctorId = Number($("#doctorSelect").val());
    const serviceId = Number($("#serviceSelect").val());
    const slotId = Number($("#selectedSlotId").val());
    const selectedSlotStartRaw = $("#selectedSlotId").attr("data-start");
    const selectedSlotStart = parseSlotDate(selectedSlotStartRaw);
    const patientNote = $("#patientNote").val().trim();

    if (!doctorId || !serviceId || !slotId) {
      ClinicCare.showAlert("#alertBox", "warning", "Doctor, service, and slot are required.");
      return;
    }
    if (selectedSlotStart && isPastSlot(selectedSlotStart)) {
      ClinicCare.showAlert("#alertBox", "warning", "This slot is no longer available because the time has passed.");
      return;
    }

    ClinicCare.api({
      method: "POST",
      url: "/patient/appointments",
      data: {
        doctorId: doctorId,
        serviceId: serviceId,
        timeSlotId: slotId,
        patientNote: patientNote
      }
    }).done(function (response) {
      bookModal.hide();
      $("#bookForm")[0].reset();
      ClinicCare.showAlert("#alertBox", "success", "Appointment booked successfully.");
      loadSlots();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  $(function () {
    if (!ClinicCare.requireAuth(["PATIENT"])) {
      return;
    }

    slotsTable = $("#slotsTable").DataTable({
      order: [[1, "asc"]],
      columnDefs: [{ targets: [3, 4], orderable: false }]
    });
    bookModal = new bootstrap.Modal(document.getElementById("bookModal"));

    $("#logoutBtn").on("click", ClinicCare.logout);
    $("#loadSlotsBtn").on("click", loadSlots);
    $("#serviceSelect").on("change", function () {
      const serviceId = Number($(this).val());
      populateDoctorsForService(serviceId);
      slotsTable.clear().draw();
    });

    $("#slotsTable").on("click", ".book-btn", function () {
      if ($(this).prop("disabled")) {
        return;
      }
      const slotId = $(this).data("slot-id");
      const start = $(this).data("start");
      const end = $(this).data("end");
      $("#selectedSlotId").val(slotId).attr("data-start", start);
      $("#selectedSlotText").text(ClinicCare.formatDateTime(start) + " - " + ClinicCare.formatDateTime(end));
      bookModal.show();
    });

    $("#bookForm").on("submit", function (event) {
      event.preventDefault();
      submitBooking();
    });

    loadServices();
    loadDoctors();
    populateDoctorsForService();

    const dateInput = $("#slotDateFilter");
    const today = toDateInputValue(new Date());
    dateInput.attr("min", today);
    dateInput.val(today);
    dateInput.on("change", function () {
      const selected = $(this).val();
      const minDate = $(this).attr("min");
      if (selected && minDate && selected < minDate) {
        $(this).val(minDate);
        ClinicCare.showAlert("#alertBox", "warning", "Past dates are not allowed for booking.");
      }
      slotsTable.clear().draw();
    });
  });
</script>
</body>
</html>
