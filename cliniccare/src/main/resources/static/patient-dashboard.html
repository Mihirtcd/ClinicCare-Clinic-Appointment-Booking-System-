<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicCare - Patient Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" rel="stylesheet">
  <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="patient-dashboard.html">ClinicCare</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link active" href="patient-dashboard.html">Dashboard</a>
      <a class="nav-link" href="patient-booking.html">Book</a>
      <a class="nav-link" href="patient-appointments.html">My Appointments</a>
      <button class="btn btn-sm btn-light ms-2" id="logoutBtn">Logout</button>
    </div>
  </div>
</nav>

<main class="container py-4">
  <h3 class="page-title mb-4">Patient Dashboard</h3>
  <div id="alertBox"></div>

  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card card-metric">
        <div class="card-body">
          <div class="small text-muted">Enabled Services</div>
          <div class="metric-value" id="serviceCount">0</div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-metric">
        <div class="card-body">
          <div class="small text-muted">My Appointments</div>
          <div class="metric-value" id="appointmentCount">0</div>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-metric">
        <div class="card-body">
          <div class="small text-muted">Pending Requests</div>
          <div class="metric-value" id="pendingCount">0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header bg-white d-flex justify-content-between">
      <span>Recent Appointments</span>
      <a href="patient-booking.html" class="btn btn-sm btn-primary">Book New</a>
    </div>
    <div class="card-body">
      <table class="table table-striped" id="appointmentsTable" style="width:100%">
        <thead>
        <tr>
          <th>Sr. No.</th>
          <th>Doctor</th>
          <th>Service</th>
          <th>Slot</th>
          <th>Status</th>
          <th>Booked At</th>
        </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
  let appointmentTable;
  const doctorMap = {};
  const serviceMap = {};

  function doctorLabel(doctor) {
    if (!doctor) {
      return "Doctor";
    }
    const fullName = ("Dr. " + (doctor.firstName || "") + " " + (doctor.lastName || "")).replace(/\s+/g, " ").trim();
    if (doctor.specialization) {
      return fullName + " (" + doctor.specialization + ")";
    }
    return fullName;
  }

  function loadDashboard() {
    $.when(
      ClinicCare.api({ url: "/patient/services" }),
      ClinicCare.api({ url: "/patient/doctors" }),
      ClinicCare.api({ url: "/patient/appointments" })
    ).done(function (servicesResp, doctorsResp, appointmentsResp) {
      const services = servicesResp[0] || [];
      const doctors = doctorsResp[0] || [];
      const appointments = appointmentsResp[0] || [];

      Object.keys(serviceMap).forEach(function (key) {
        delete serviceMap[key];
      });
      Object.keys(doctorMap).forEach(function (key) {
        delete doctorMap[key];
      });
      services.forEach(function (service) {
        serviceMap[service.id] = service;
      });
      doctors.forEach(function (doctor) {
        doctorMap[doctor.id] = doctor;
      });

      $("#serviceCount").text(services.length);
      const rows = Array.isArray(appointments) ? appointments : [];
      $("#appointmentCount").text(rows.length);
      $("#pendingCount").text(rows.filter(function (x) { return x.status === "PENDING"; }).length);

      appointmentTable.clear();
      rows.forEach(function (item, index) {
        const doctor = doctorMap[item.doctorId];
        const service = serviceMap[item.serviceId];
        const doctorText = doctor ? doctorLabel(doctor) : "Doctor";
        const serviceText = service ? (service.name || "Service") : "Service";
        const slotText = (item.slotStartTime && item.slotEndTime)
          ? (ClinicCare.formatDateTime(item.slotStartTime) + " - " + ClinicCare.formatDateTime(item.slotEndTime))
          : "Scheduled";

        appointmentTable.row.add([
          index + 1,
          doctorText,
          serviceText,
          slotText,
          ClinicCare.statusBadge(item.status),
          ClinicCare.formatDateTime(item.bookedAt)
        ]);
      });
      appointmentTable.draw();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  $(function () {
    if (!ClinicCare.requireAuth(["PATIENT"])) {
      return;
    }

    appointmentTable = $("#appointmentsTable").DataTable({
      order: [[5, "desc"]],
      columnDefs: [
        { targets: 4, orderable: false }
      ]
    });

    $("#logoutBtn").on("click", ClinicCare.logout);
    loadDashboard();
  });
</script>
</body>
</html>
