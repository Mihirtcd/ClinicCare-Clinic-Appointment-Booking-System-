<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicCare - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
  <div class="d-flex justify-content-end mb-3">
    <a class="btn btn-outline-secondary btn-sm" href="index.html">
      <i class="bi bi-house-door me-1"></i>Home
    </a>
  </div>
  <div class="row justify-content-center">
    <div class="col-12">
      <div class="card auth-card mx-auto shadow-sm">
        <div class="card-body p-4">
          <h3 class="text-center mb-3">ClinicCare Login</h3>
          <p class="text-center small-muted mb-4">Sign in to access your dashboard.</p>

          <div id="alertBox"></div>

          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label required" for="email">Email</label>
              <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label required" for="password">Password</label>
              <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-1"></i>Login</button>
          </form>

          <div class="text-center mt-3">
            <a href="register.html">Create patient account</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
  $(function () {
    if (ClinicCare.getToken() && ClinicCare.getRole()) {
      ClinicCare.redirectByRole(ClinicCare.getRole());
      return;
    }

    $("#loginForm").on("submit", function (event) {
      event.preventDefault();
      $("#alertBox").empty();

      const payload = {
        email: $("#email").val().trim(),
        password: $("#password").val()
      };

      ClinicCare.api({
        method: "POST",
        url: "/auth/login",
        auth: false,
        data: payload
      }).done(function (response, textStatus, xhr) {
        const token = ClinicCare.extractToken(xhr);
        if (!token) {
          ClinicCare.showAlert("#alertBox", "danger", "Login succeeded but token was not returned.");
          return;
        }
        ClinicCare.setAuth(token, response);
        ClinicCare.redirectByRole(response.role);
      }).fail(function (xhr) {
        ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
      });
    });
  });
</script>
</body>
</html>
