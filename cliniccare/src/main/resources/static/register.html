<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicCare - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
  <div class="d-flex justify-content-end mb-3">
    <a class="btn btn-outline-secondary btn-sm" href="index.html">
      <i class="bi bi-house-door me-1"></i>Home
    </a>
  </div>
  <div class="row justify-content-center">
    <div class="col-12">
      <div class="card auth-card mx-auto shadow-sm">
        <div class="card-body p-4">
          <h3 class="text-center mb-3">Patient Registration</h3>
          <p class="text-center small-muted mb-4">Create your account to start booking appointments.</p>

          <div id="alertBox"></div>

          <form id="registerForm">
            <div class="mb-3">
              <label class="form-label required" for="firstName">First Name</label>
              <input type="text" id="firstName" class="form-control" maxlength="50" required>
            </div>
            <div class="mb-3">
              <label class="form-label required" for="lastName">Last Name</label>
              <input type="text" id="lastName" class="form-control" maxlength="50" required>
            </div>
            <div class="mb-3">
              <label class="form-label required" for="email">Email</label>
              <input type="email" id="email" class="form-control" maxlength="120" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="phoneNumber">Phone Number</label>
              <input type="text" id="phoneNumber" class="form-control" maxlength="20">
            </div>
            <div class="mb-3">
              <label class="form-label required" for="password">Password</label>
              <input type="password" id="password" class="form-control" minlength="8" maxlength="72" required>
              <div class="form-text">Use 8-72 chars with upper, lower, number and special character.</div>
            </div>
            <div class="mb-3">
              <label class="form-label required" for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" class="form-control" minlength="8" maxlength="72" required>
            </div>
            <button type="submit" class="btn btn-success w-100"><i class="bi bi-person-plus me-1"></i>Register</button>
          </form>

          <div class="text-center mt-3">
            <a href="login.html">Back to login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
  $(function () {
    $("#registerForm").on("submit", function (event) {
      event.preventDefault();
      $("#alertBox").empty();

      const password = $("#password").val();
      const confirmPassword = $("#confirmPassword").val();
      if (password !== confirmPassword) {
        ClinicCare.showAlert("#alertBox", "danger", "Password and confirm password must match.");
        return;
      }

      const payload = {
        firstName: $("#firstName").val().trim(),
        lastName: $("#lastName").val().trim(),
        email: $("#email").val().trim(),
        password: password,
        phoneNumber: $("#phoneNumber").val().trim()
      };

      ClinicCare.api({
        method: "POST",
        url: "/auth/register",
        auth: false,
        data: payload
      }).done(function () {
        ClinicCare.showAlert("#alertBox", "success", "Registration successful. Redirecting to login...");
        setTimeout(function () {
          window.location.href = "login.html";
        }, 1200);
      }).fail(function (xhr) {
        ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
      });
    });
  });
</script>
</body>
</html>
