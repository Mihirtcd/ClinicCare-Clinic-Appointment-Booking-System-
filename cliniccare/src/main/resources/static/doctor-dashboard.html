<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicCare - Doctor Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" rel="stylesheet">
  <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand" href="doctor-dashboard.html">ClinicCare</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="index.html"><i class="bi bi-house-door me-1"></i>Home</a>
      <a class="nav-link active" href="doctor-dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
      <button class="btn btn-sm btn-light ms-2" id="logoutBtn"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
    </div>
  </div>
</nav>

<main class="container py-4">
  <h3 class="page-title mb-4">Doctor Dashboard</h3>
  <div id="alertBox"></div>

  <div class="row g-3 mb-4">
    <div class="col-lg-3 col-md-6">
      <div class="card card-metric">
        <div class="card-body">
          <div class="small text-muted">Total Appointments</div>
          <div class="metric-value" id="totalCount">0</div>
        </div>
      </div>
    </div>
    <div class="col-lg-3 col-md-6">
      <div class="card card-metric">
        <div class="card-body">
          <div class="small text-muted">Pending</div>
          <div class="metric-value" id="pendingCount">0</div>
        </div>
      </div>
    </div>
    <div class="col-lg-3 col-md-6">
      <div class="card card-metric">
        <div class="card-body">
          <div class="small text-muted">Confirmed</div>
          <div class="metric-value" id="confirmedCount">0</div>
        </div>
      </div>
    </div>
    <div class="col-lg-3 col-md-6">
      <div class="card card-metric">
        <div class="card-body">
          <div class="small text-muted">Completed</div>
          <div class="metric-value" id="completedCount">0</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
      <span>My Appointment Schedule</span>
      <div class="d-flex gap-2">
        <select id="statusFilter" class="form-select form-select-sm">
          <option value="">All Statuses</option>
          <option value="PENDING">PENDING</option>
          <option value="CONFIRMED">CONFIRMED</option>
          <option value="REJECTED">REJECTED</option>
          <option value="COMPLETED">COMPLETED</option>
          <option value="CANCELLED">CANCELLED</option>
        </select>
        <button class="btn btn-sm btn-outline-success" id="refreshBtn"><i class="bi bi-arrow-repeat me-1"></i>Refresh</button>
      </div>
    </div>
    <div class="card-body">
      <table class="table table-striped" id="scheduleTable" style="width:100%">
        <thead>
        <tr>
          <th>Sr. No.</th>
          <th>Patient</th>
          <th>Service</th>
          <th>Slot</th>
          <th>Status</th>
          <th>Note</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal fade" id="rejectModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <form class="modal-content" id="rejectForm">
      <div class="modal-header">
        <h5 class="modal-title">Reject Appointment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="rejectAppointmentId">
        <div class="mb-3">
          <label class="form-label">Reason</label>
          <textarea id="rejectReason" class="form-control" maxlength="500" rows="3" placeholder="Unavailable"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-danger"><i class="bi bi-x-circle me-1"></i>Reject</button>
      </div>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
  let scheduleTable;
  let rejectModal;

  function fullName(nameValue, fallback) {
    const cleaned = (nameValue || "").trim();
    return cleaned ? cleaned : fallback;
  }

  function isCompletable(appointment) {
    if (!appointment.slotEndTime) {
      return true;
    }
    const slotEndTime = new Date(appointment.slotEndTime);
    if (Number.isNaN(slotEndTime.getTime())) {
      return true;
    }
    return Date.now() >= slotEndTime.getTime();
  }

  function loadDashboard() {
    const status = $("#statusFilter").val();
    const url = status ? ("/doctor/appointments?status=" + encodeURIComponent(status)) : "/doctor/appointments";

    ClinicCare.api({ url: url }).done(function (appointments) {
      const rows = appointments || [];
      $("#totalCount").text(rows.length);
      $("#pendingCount").text(rows.filter(function (x) { return x.status === "PENDING"; }).length);
      $("#confirmedCount").text(rows.filter(function (x) { return x.status === "CONFIRMED"; }).length);
      $("#completedCount").text(rows.filter(function (x) { return x.status === "COMPLETED"; }).length);

      scheduleTable.clear();
      rows.forEach(function (item, index) {
        const slotText = (item.slotStartTime && item.slotEndTime)
          ? (ClinicCare.formatDateTime(item.slotStartTime) + " - " + ClinicCare.formatDateTime(item.slotEndTime))
          : "Scheduled";

        let actions = "";
        if (item.status === "PENDING") {
          actions =
            '<div class="table-actions">' +
            '<button class="btn btn-sm btn-primary confirm-btn" data-id="' + item.id + '"><i class="bi bi-check2 me-1"></i>Confirm</button>' +
            '<button class="btn btn-sm btn-danger reject-btn" data-id="' + item.id + '"><i class="bi bi-x-circle me-1"></i>Reject</button>' +
            "</div>";
        } else if (item.status === "CONFIRMED") {
          if (isCompletable(item)) {
            actions =
              '<div class="table-actions">' +
              '<button class="btn btn-sm btn-success complete-btn" data-id="' + item.id + '"><i class="bi bi-check2-circle me-1"></i>Complete</button>' +
              "</div>";
          } else {
            actions =
              '<div class="table-actions">' +
              '<button class="btn btn-sm btn-secondary" disabled title="Can be completed only after slot end time"><i class="bi bi-check2-circle me-1"></i>Complete</button>' +
              "</div>";
          }
        }

        scheduleTable.row.add([
          index + 1,
          fullName(item.patientName, "Patient"),
          item.serviceName || "Service",
          slotText,
          ClinicCare.statusBadge(item.status),
          item.patientNote || "",
          actions
        ]);
      });
      scheduleTable.draw();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  function callAction(url, method, payload, successMessage) {
    ClinicCare.api({
      method: method,
      url: url,
      data: payload
    }).done(function () {
      ClinicCare.showAlert("#alertBox", "success", successMessage);
      loadDashboard();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  $(function () {
    if (!ClinicCare.requireAuth(["DOCTOR"])) {
      return;
    }

    scheduleTable = $("#scheduleTable").DataTable({
      order: [[3, "asc"]],
      scrollY: "50vh",
      scrollCollapse: true,
      columnDefs: [
        { targets: 4, orderable: false },
        { targets: 6, orderable: false }
      ]
    });
    rejectModal = new bootstrap.Modal(document.getElementById("rejectModal"));

    $("#logoutBtn").on("click", ClinicCare.logout);
    $("#refreshBtn").on("click", loadDashboard);
    $("#statusFilter").on("change", loadDashboard);

    $("#scheduleTable").on("click", ".confirm-btn", function () {
      const id = Number($(this).data("id"));
      callAction("/appointments/" + id + "/confirm", "PATCH", undefined, "Appointment confirmed.");
    });

    $("#scheduleTable").on("click", ".complete-btn", function () {
      const id = Number($(this).data("id"));
      callAction("/appointments/" + id + "/complete", "PATCH", undefined, "Appointment marked as completed.");
    });

    $("#scheduleTable").on("click", ".reject-btn", function () {
      const id = Number($(this).data("id"));
      $("#rejectAppointmentId").val(id);
      $("#rejectReason").val("");
      rejectModal.show();
    });

    $("#rejectForm").on("submit", function (event) {
      event.preventDefault();
      const id = Number($("#rejectAppointmentId").val());
      callAction("/appointments/" + id + "/reject", "PATCH", {
        appointmentId: id,
        rejectionReason: $("#rejectReason").val().trim()
      }, "Appointment rejected.");
      rejectModal.hide();
    });

    loadDashboard();
  });
</script>
</body>
</html>
