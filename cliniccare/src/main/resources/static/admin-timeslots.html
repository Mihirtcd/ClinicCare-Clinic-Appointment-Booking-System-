<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicCare - Admin Time Slots</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" rel="stylesheet">
  <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="admin-dashboard.html">ClinicCare Admin</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="admin-dashboard.html">Dashboard</a>
      <a class="nav-link" href="admin-users.html">Users</a>
      <a class="nav-link" href="admin-doctors.html">Doctors</a>
      <a class="nav-link" href="admin-services.html">Services</a>
      <a class="nav-link active" href="admin-timeslots.html">Time Slots</a>
      <button class="btn btn-sm btn-light ms-2" id="logoutBtn">Logout</button>
    </div>
  </div>
</nav>

<main class="container py-4">
  <h3 class="page-title mb-4">Admin Time Slot Management</h3>
  <div id="alertBox"></div>

  <div class="card mb-3">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-md-6">
          <label class="form-label required">Doctor</label>
          <select id="doctorSelect" class="form-select"></select>
        </div>
        <div class="col-md-3">
          <button class="btn btn-outline-primary w-100" id="loadSlotsBtn">Load Slots</button>
        </div>
        <div class="col-md-3 text-md-end">
          <button class="btn btn-primary w-100" id="openCreateSlotBtn">Create Slot</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <table class="table table-striped" id="slotTable" style="width:100%">
        <thead>
        <tr>
          <th>Sr. No.</th>
          <th>Doctor</th>
          <th>Start Time</th>
          <th>End Time</th>
          <th>Status</th>
        </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal fade" id="createSlotModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <form class="modal-content" id="createSlotForm">
      <div class="modal-header">
        <h5 class="modal-title">Create Time Slot</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label required">Doctor</label>
          <select id="slotDoctorSelect" class="form-select" required></select>
        </div>
        <div class="mb-3">
          <label class="form-label required">Start Time</label>
          <input type="datetime-local" id="startTime" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label required">End Time</label>
          <input type="datetime-local" id="endTime" class="form-control" required>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Slot</button>
      </div>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
  let slotTable;
  let createSlotModal;
  const doctorMap = {};

  function doctorLabel(doctor) {
    if (!doctor) {
      return "Doctor";
    }
    return ("Dr. " + (doctor.firstName || "") + " " + (doctor.lastName || "")).replace(/\s+/g, " ").trim();
  }

  function loadDoctors() {
    ClinicCare.api({ url: "/admin/doctors" }).done(function (doctors) {
      Object.keys(doctorMap).forEach(function (key) {
        delete doctorMap[key];
      });

      const selects = ["#doctorSelect", "#slotDoctorSelect"];
      selects.forEach(function (selector) {
        const select = $(selector);
        select.empty();
        select.append('<option value="">Select doctor</option>');
        (doctors || []).forEach(function (d) {
          doctorMap[d.id] = d;
          select.append('<option value="' + d.id + '">' + doctorLabel(d) + "</option>");
        });
      });
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  function loadSlotsByDoctor() {
    const doctorId = Number($("#doctorSelect").val());
    if (!doctorId) {
      ClinicCare.showAlert("#alertBox", "warning", "Please select a doctor.");
      return;
    }

    ClinicCare.api({ url: "/admin/timeslots/doctor/" + doctorId }).done(function (slots) {
      const doctor = doctorMap[doctorId];
      slotTable.clear();
      (slots || []).forEach(function (item, index) {
        slotTable.row.add([
          index + 1,
          doctorLabel(doctor),
          ClinicCare.formatDateTime(item.startTime),
          ClinicCare.formatDateTime(item.endTime),
          ClinicCare.statusBadge(item.status)
        ]);
      });
      slotTable.draw();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  function createSlot() {
    const doctorId = Number($("#slotDoctorSelect").val());
    const startTime = ClinicCare.normalizeDateTimeLocal($("#startTime").val());
    const endTime = ClinicCare.normalizeDateTimeLocal($("#endTime").val());

    if (!doctorId || !startTime || !endTime) {
      ClinicCare.showAlert("#alertBox", "warning", "Doctor, start time, and end time are required.");
      return;
    }

    ClinicCare.api({
      method: "POST",
      url: "/admin/timeslots",
      data: {
        doctorId: doctorId,
        startTime: startTime,
        endTime: endTime
      }
    }).done(function () {
      createSlotModal.hide();
      $("#createSlotForm")[0].reset();
      ClinicCare.showAlert("#alertBox", "success", "Time slot created successfully.");
      $("#doctorSelect").val(String(doctorId));
      loadSlotsByDoctor();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  $(function () {
    if (!ClinicCare.requireAuth(["ADMIN"])) {
      return;
    }

    slotTable = $("#slotTable").DataTable({
      order: [[2, "asc"]],
      columnDefs: [
        { targets: 4, orderable: false }
      ]
    });
    createSlotModal = new bootstrap.Modal(document.getElementById("createSlotModal"));

    $("#logoutBtn").on("click", ClinicCare.logout);
    $("#loadSlotsBtn").on("click", loadSlotsByDoctor);
    $("#openCreateSlotBtn").on("click", function () {
      const selectedDoctorId = $("#doctorSelect").val();
      if (selectedDoctorId) {
        $("#slotDoctorSelect").val(selectedDoctorId);
      }
      createSlotModal.show();
    });
    $("#createSlotForm").on("submit", function (event) {
      event.preventDefault();
      createSlot();
    });

    loadDoctors();
  });
</script>
</body>
</html>
