<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicCare - Admin Services</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" rel="stylesheet">
  <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="admin-dashboard.html">ClinicCare Admin</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="admin-dashboard.html">Dashboard</a>
      <a class="nav-link" href="admin-users.html">Users</a>
      <a class="nav-link" href="admin-doctors.html">Doctors</a>
      <a class="nav-link active" href="admin-services.html">Services</a>
      <a class="nav-link" href="admin-timeslots.html">Time Slots</a>
      <button class="btn btn-sm btn-light ms-2" id="logoutBtn">Logout</button>
    </div>
  </div>
</nav>

<main class="container py-4">
  <h3 class="page-title mb-4">Admin Service Management</h3>
  <div id="alertBox"></div>

  <div class="mb-3 text-end">
    <button class="btn btn-primary" id="createServiceBtn">Create Service</button>
  </div>

  <div class="card">
    <div class="card-body">
      <table class="table table-striped" id="serviceTable" style="width:100%">
        <thead>
        <tr>
          <th>Sr. No.</th>
          <th>Name</th>
          <th>Description</th>
          <th>Duration</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal fade" id="serviceModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <form class="modal-content" id="serviceForm">
      <div class="modal-header">
        <h5 class="modal-title" id="serviceModalTitle">Create Service</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="serviceId">
        <div class="mb-3">
          <label class="form-label required">Name</label>
          <input type="text" id="name" class="form-control" maxlength="100" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea id="description" class="form-control" maxlength="500" rows="3"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label required">Duration Minutes</label>
          <input type="number" id="durationMinutes" class="form-control" min="5" max="480" required>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="isEnabled" checked>
          <label class="form-check-label" for="isEnabled">Enabled</label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
  let serviceTable;
  let serviceModal;
  const serviceCache = {};

  function openCreateModal() {
    $("#serviceModalTitle").text("Create Service");
    $("#serviceForm")[0].reset();
    $("#serviceId").val("");
    $("#isEnabled").prop("checked", true);
    serviceModal.show();
  }

  function openEditModal(data) {
    $("#serviceModalTitle").text("Update Service");
    $("#serviceId").val(data.id);
    $("#name").val(data.name || "");
    $("#description").val(data.description || "");
    $("#durationMinutes").val(data.durationMinutes || 30);
    $("#isEnabled").prop("checked", !!data.isEnabled);
    serviceModal.show();
  }

  function loadServices() {
    ClinicCare.api({ url: "/admin/services" }).done(function (services) {
      Object.keys(serviceCache).forEach(function (key) {
        delete serviceCache[key];
      });
      serviceTable.clear();
      (services || []).forEach(function (item, index) {
        serviceCache[item.id] = item;
        const serviceStatus = item.isEnabled
          ? '<span class="badge bg-success">ENABLED</span>'
          : '<span class="badge bg-danger">DISABLED</span>';
        const actions =
          '<div class="table-actions">' +
          '<button class="btn btn-sm btn-outline-primary edit-btn" data-id="' + item.id + '">Edit</button>' +
          '<button class="btn btn-sm btn-outline-danger disable-btn" data-id="' + item.id + '">Disable</button>' +
          "</div>";
        serviceTable.row.add([
          index + 1,
          item.name || "",
          item.description || "",
          item.durationMinutes || "",
          serviceStatus,
          actions
        ]);
      });
      serviceTable.draw();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  function saveService() {
    const id = $("#serviceId").val();
    const payload = {
      name: $("#name").val().trim(),
      description: $("#description").val().trim(),
      durationMinutes: Number($("#durationMinutes").val()),
      isEnabled: $("#isEnabled").is(":checked")
    };

    if (!id) {
      ClinicCare.api({
        method: "POST",
        url: "/admin/services",
        data: payload
      }).done(function () {
        serviceModal.hide();
        ClinicCare.showAlert("#alertBox", "success", "Service created successfully.");
        loadServices();
      }).fail(function (xhr) {
        ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
      });
      return;
    }

    ClinicCare.api({
      method: "PUT",
      url: "/admin/services/" + id,
      data: payload
    }).done(function () {
      serviceModal.hide();
      ClinicCare.showAlert("#alertBox", "success", "Service updated successfully.");
      loadServices();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  function disableService(id) {
    ClinicCare.api({
      method: "PATCH",
      url: "/admin/services/" + id + "/disable"
    }).done(function () {
      ClinicCare.showAlert("#alertBox", "success", "Service disabled successfully.");
      loadServices();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  $(function () {
    if (!ClinicCare.requireAuth(["ADMIN"])) {
      return;
    }

    serviceModal = new bootstrap.Modal(document.getElementById("serviceModal"));
    serviceTable = $("#serviceTable").DataTable({
      order: [[1, "asc"]],
      columnDefs: [
        { targets: [4, 5], orderable: false }
      ]
    });

    $("#logoutBtn").on("click", ClinicCare.logout);
    $("#createServiceBtn").on("click", openCreateModal);
    $("#serviceForm").on("submit", function (event) {
      event.preventDefault();
      saveService();
    });

    $("#serviceTable").on("click", ".edit-btn", function () {
      const id = $(this).data("id");
      openEditModal(serviceCache[id]);
    });

    $("#serviceTable").on("click", ".disable-btn", function () {
      const id = $(this).data("id");
      disableService(id);
    });

    loadServices();
  });
</script>
</body>
</html>
