<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicCare - Admin Doctors</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" rel="stylesheet">
  <link href="assets/css/app.css" rel="stylesheet">
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar" id="adminSidebar"></aside>

  <main class="admin-content">
    <div class="admin-page-head">
      <h3 class="page-title mb-0">Admin Doctor Management</h3>
      <button class="btn btn-primary" id="openCreateDoctorBtn"><i class="bi bi-person-plus me-1"></i>Create Doctor Profile</button>
    </div>
    <div id="alertBox"></div>

    <div class="card table-fit">
      <div class="card-body">
        <table class="table table-striped" id="doctorTable" style="width:100%">
          <thead>
          <tr>
            <th>Sr. No.</th>
            <th>Name</th>
            <th>Specialization</th>
            <th>Services</th>
          </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal fade" id="createDoctorModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <form class="modal-content" id="createDoctorForm">
      <div class="modal-header">
        <h5 class="modal-title">Create Doctor Profile</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label required">Doctor User</label>
            <select id="doctorUserSelect" class="form-select" required></select>
            <div class="form-text">Select a user with role DOCTOR.</div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Specialization</label>
            <input
              type="text"
              id="specialization"
              class="form-control"
              maxlength="100"
              list="specializationSuggestions"
              placeholder="Select or type specialization"
            >
            <datalist id="specializationSuggestions">
              <option value="General Physician"></option>
              <option value="Cardiology"></option>
              <option value="Dermatology"></option>
              <option value="Orthopedics"></option>
              <option value="Pediatrics"></option>
              <option value="ENT"></option>
              <option value="Neurology"></option>
              <option value="Psychiatry"></option>
              <option value="Ophthalmology"></option>
              <option value="Dentistry"></option>

              <option value="Gynecology"></option>
              <option value="Urology"></option>
              <option value="Gastroenterology"></option>
              <option value="Endocrinology"></option>
              <option value="Pulmonology"></option>
              <option value="Rheumatology"></option>
              <option value="Oncology"></option>
              <option value="Nephrology"></option>
              <option value="Hematology"></option>
              <option value="Allergy and Immunology"></option>

              <option value="Family Medicine"></option>
              <option value="Internal Medicine"></option>
              <option value="Sports Medicine"></option>
              <option value="Plastic Surgery"></option>
              <option value="Emergency Medicine"></option>
            </datalist>
          </div>
        </div>
        <div class="mt-3">
          <label class="form-label">Assign Services</label>
          <select id="serviceIds" class="form-select" multiple size="6"></select>
          <div class="form-text">Use Ctrl/Cmd + click for multiple selection.</div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i>Create Profile</button>
      </div>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/ui-common.js"></script>
<script src="assets/js/admin-shell.js"></script>
<script>
  let doctorTable;
  let createModal;
  const serviceNameMap = {};

  function loadDoctors() {
    $.when(
      ClinicCare.api({ url: "/admin/doctors" }),
      ClinicCare.api({ url: "/admin/services" })
    ).done(function (doctorsResp, servicesResp) {
      const doctors = doctorsResp[0] || [];
      const services = servicesResp[0] || [];
      Object.keys(serviceNameMap).forEach(function (key) {
        delete serviceNameMap[key];
      });
      services.forEach(function (service) {
        serviceNameMap[service.id] = service.name || "Service";
      });

      doctorTable.clear();
      doctors.forEach(function (item, index) {
        const serviceNames = (item.serviceIds || []).map(function (id) {
          return serviceNameMap[id] || "Service";
        });
        doctorTable.row.add([
          index + 1,
          (item.firstName || "") + " " + (item.lastName || ""),
          item.specialization || "",
          serviceNames.join(", ")
        ]);
      });
      doctorTable.draw();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  function loadDoctorUsers() {
    ClinicCare.api({ url: "/admin/users?role=DOCTOR" }).done(function (users) {
      const select = $("#doctorUserSelect");
      select.empty();
      select.append('<option value="">Select doctor user</option>');
      (users || []).forEach(function (u) {
        select.append('<option value="' + u.id + '">' + u.firstName + " " + u.lastName + " (" + u.email + ")</option>");
      });
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  function loadServices() {
    ClinicCare.api({ url: "/admin/services" }).done(function (services) {
      const select = $("#serviceIds");
      select.empty();
      (services || []).forEach(function (s) {
        select.append('<option value="' + s.id + '">' + s.name + "</option>");
      });
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  function createDoctorProfile() {
    const selectedServiceIds = ($("#serviceIds").val() || []).map(function (x) {
      return Number(x);
    });

    ClinicCare.api({
      method: "POST",
      url: "/admin/doctors",
      data: {
        userId: Number($("#doctorUserSelect").val()),
        specialization: $("#specialization").val().trim(),
        serviceIds: selectedServiceIds
      }
    }).done(function (response) {
      createModal.hide();
      $("#createDoctorForm")[0].reset();
      ClinicCare.showAlert("#alertBox", "success", "Doctor profile created successfully.");
      loadDoctors();
    }).fail(function (xhr) {
      ClinicCare.showAlert("#alertBox", "danger", ClinicCare.extractErrorMessage(xhr));
    });
  }

  $(function () {
    ClinicCareUi.renderAdminSidebar("doctors");

    if (!ClinicCare.requireAuth(["ADMIN"])) {
      return;
    }

    createModal = new bootstrap.Modal(document.getElementById("createDoctorModal"));
    doctorTable = ClinicCareUi.initDataTable("#doctorTable", {
      order: [[1, "asc"]]
    });

    $("#logoutBtn").on("click", ClinicCare.logout);

    $("#openCreateDoctorBtn").on("click", function () {
      loadDoctorUsers();
      loadServices();
      createModal.show();
    });

    $("#createDoctorForm").on("submit", function (event) {
      event.preventDefault();
      createDoctorProfile();
    });

    loadDoctors();
  });
</script>
</body>
</html>
